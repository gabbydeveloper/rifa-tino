<div class="admin-container p-4">
  <p-card header="🎟️ Administración de Tickets - Rifa Tino" class="shadow-3">
    <div class="flex justify-content-between align-items-center mb-3">
      <h2 class="text-xl font-bold">Tickets asignados</h2>
      <p-button icon="pi pi-refresh" [loading]="loading" (click)="cargarTickets()" label="Actualizar"
        styleClass="p-button-outlined"></p-button>
    </div>

    <p-table [value]="tickets()" [loading]="loading" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5,10,20]"
      class="p-datatable-sm" currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} tickets"
      [showCurrentPageReport]="true">
      <ng-template pTemplate="header">
        <tr>
          <th>Número de Ticket</th>
          <th>Nombre del Donante</th>
          <th>Estado</th>
          <th>ID Donante</th>
          <th style="width: 100px">Acción</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-ticket>
        <tr [ngStyle]="{'cursor': 'pointer'}" (click)="abrirDialog(ticket)">
          <td class="font-bold">{{ ticket.nroTicket }}</td>
          <td>{{ ticket.nombreDonante }}</td>
          <td>
            <p-tag 
              [severity]="getEstadoSeverity(ticket.estadoTicket)" 
              [value]="getEstadoLabel(ticket.estadoTicket)"
            ></p-tag>
          </td>
          <td>{{ ticket.idDonante }}</td>
          <td>
            <p-button icon="pi pi-pencil" (click)="abrirDialog(ticket); $event.stopPropagation()"
              styleClass="p-button-rounded p-button-text p-button-sm"></p-button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center">No hay tickets asignados aún</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<p-dialog header="Cambiar estado del ticket" [(visible)]="dialogVisible" [modal]="true" [style]="{ width: '450px' }"
  [draggable]="false" *ngIf="selectedTicket">
  <div class="text-center">
    <h3>Ticket: {{ selectedTicket.nroTicket }}</h3>
    <p>Donante: <strong>{{ selectedTicket.nombreDonante }}</strong></p>
    <p>Estado actual:
      <p-tag [severity]="getEstadoSeverity(selectedTicket.estadoTicket)"
        [value]="getEstadoLabel(selectedTicket.estadoTicket)"></p-tag>
    </p>
    <div class="flex justify-content-center gap-3 mt-4">
      <p-button label="Bloquear (BLQ)" icon="pi pi-lock" styleClass="p-button-danger"
        (click)="cambiarEstado('BLQ')"></p-button>
      <p-button label="Disponible (AVL)" icon="pi pi-unlock" styleClass="p-button-success"
        (click)="cambiarEstado('AVL')"></p-button>
    </div>
  </div>
</p-dialog>

<p-toast position="top-right"></p-toast>
<p-confirmDialog></p-confirmDialog>
